name: Build QMK Firmware

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi binutils-arm-none-eabi
          sudo pip3 install qmk

      - name: Clone QMK firmware
        run: |
          git clone --recurse-submodules --depth 1 https://github.com/qmk/qmk_firmware.git $HOME/qmk_firmware

      - name: Copy keyboard files
        run: |
          mkdir -p $HOME/qmk_firmware/keyboards/wetzii_hackpad/keymaps/default
          cp Firmware/info.json $HOME/qmk_firmware/keyboards/wetzii_hackpad/
          cp Firmware/config.h $HOME/qmk_firmware/keyboards/wetzii_hackpad/
          cp Firmware/rules.mk $HOME/qmk_firmware/keyboards/wetzii_hackpad/
          cp Firmware/keymaps/default/keymap.c $HOME/qmk_firmware/keyboards/wetzii_hackpad/keymaps/default/

      - name: Compile
        run: |
          cd $HOME/qmk_firmware
          qmk compile -kb wetzii_hackpad -km default
          find $HOME/qmk_firmware/.build -name "*.uf2" -exec cp {} $GITHUB_WORKSPACE/firmware.uf2 \;

      - name: Upload .uf2
        uses: actions/upload-artifact@v4
        with:
          name: wetzii_hackpad_firmware
          path: firmware.uf2
