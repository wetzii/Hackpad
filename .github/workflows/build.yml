name: Build QMK Firmware

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup QMK
        uses: qmk/qmk_firmware/.github/actions/setup@master

      - name: Copy keyboard files
        run: |
          cp -r Firmware/ $QMK_HOME/keyboards/wetzii_hackpad/

      - name: Compile firmware
        run: |
          qmk compile -kb wetzii_hackpad -km default

      - name: Upload .uf2
        uses: actions/upload-artifact@v4
        with:
          name: wetzii_hackpad_firmware
          path: $QMK_HOME/.build/*.uf2
