name: Build Hackpad UF2 for Seed Studio

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1️⃣ Repo klonen
    - uses: actions/checkout@v3

    # 2️⃣ Abhängigkeiten installieren
    - name: Install build tools
      run: |
        sudo apt update
        sudo apt install -y cmake gcc-arm-none-eabi build-essential libnewlib-arm-none-eabi ninja-build git

    # 3️⃣ Seed Studio RP2040 (RP2040 SDK bleibt gleich)
    - name: Clone Pico SDK
      run: |
        git clone https://github.com/raspberrypi/pico-sdk.git $HOME/pico-sdk
        cd $HOME/pico-sdk
        git submodule update --init

    # 4️⃣ Build Hackpad für Seed Studio XIAO RP2040
    - name: Build Hackpad UF2
      run: |
        mkdir build
        cd build
        cmake .. -D PICO_BOARD=xiao_rp2040 -G Ninja
        ninja

    # 5️⃣ UF2 als Artifact bereitstellen
    - name: Upload UF2 Artifact
      uses: actions/upload-artifact@v3
      with:
        name: hackpad-uf2
        path: build/hackpad.uf2
