name: Build QMK Firmware

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-arm-none-eabi \
            binutils-arm-none-eabi \
            gcc-avr \
            avr-libc \
            avrdude \
            dfu-util \
            dos2unix

      - name: Install QMK CLI
        run: pip install qmk

      - name: Clone QMK Firmware
        run: |
          git clone --depth 1 --recurse-submodules https://github.com/qmk/qmk_firmware.git
          cd qmk_firmware
          pip install -r requirements.txt

      - name: Copy keyboard files into QMK
        run: |
          mkdir -p qmk_firmware/keyboards/wetzii/hackpad/keymaps/default
          cp Firmware/hackpad.c    qmk_firmware/keyboards/wetzii/hackpad/hackpad.c
          cp Firmware/hackpad.h    qmk_firmware/keyboards/wetzii/hackpad/hackpad.h
          cp Firmware/config.h     qmk_firmware/keyboards/wetzii/hackpad/config.h
          cp Firmware/info.json    qmk_firmware/keyboards/wetzii/hackpad/info.json
          cp Firmware/rules.mk     qmk_firmware/keyboards/wetzii/hackpad/rules.mk
          cp Firmware/keymaps/default/keymap.c qmk_firmware/keyboards/wetzii/hackpad/keymaps/default/keymap.c

      - name: Verify keyboard is found
        run: |
          cd qmk_firmware
          qmk list-keyboards | grep wetzii

      - name: Build firmware
        run: |
          cd qmk_firmware
          qmk compile -kb wetzii/hackpad -km default

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: wetzii_hackpad_firmware
          path: qmk_firmware/*.uf2
          if-no-files-found: error
