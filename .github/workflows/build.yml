name: Build UF2

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install Pico SDK
        run: |
          sudo apt update
          sudo apt install cmake gcc-arm-none-eabi build-essential git -y

      - name: Build firmware
        run: |
          cd Firmware
          mkdir build
          cd build
          cmake ..
          make

      - name: Upload UF2
        uses: actions/upload-artifact@v3
        with:
          name: firmware
          path: Firmware/build/*.uf2
