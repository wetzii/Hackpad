name: Build QMK Firmware

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi binutils-arm-none-eabi
          sudo pip3 install qmk

      - name: Clone QMK firmware
        run: |
          git clone --recurse-submodules --depth 1 https://github.com/qmk/qmk_firmware.git $HOME/qmk_firmware

      - name: Copy keyboard files
        run: |
          mkdir -p $HOME/qmk_firmware/keyboards/wetzii_hackpad/keymaps/default
          cp Firmware/info.json $HOME/qmk_firmware/keyboards/wetzii_hackpad/
          cp Firmware/config.h $HOME/qmk_firmware/keyboards/wetzii_hackpad/
          cp Firmware/rules.mk $HOME/qmk_firmware/keyboards/wetzii_hackpad/
          cp Firmware/keymaps/default/keymap.c $HOME/qmk_firmware/keyboards/wetzii_hackpad/keymaps/default/

      - name: Debug - check if keyboard is recognized
        run: |
          cd $HOME/qmk_firmware
          echo "=== rules.mk ==="
          cat keyboards/wetzii_hackpad/rules.mk
          echo "=== Trying to list ==="
          qmk list-keyboards 2>&1 | grep -i wetzii || echo "NOT FOUND"
          echo "=== Schema validation ==="
          python3 -c "
          import json, sys
          with open('keyboards/wetzii_hackpad/info.json') as f:
              d = json.load(f)
          required = ['keyboard_name','processor','bootloader','matrix_pins','layouts']
          for r in required:
              print(f'{r}: {\"OK\" if r in d else \"MISSING'}')
          "

      - name: Compile
        run: |
          cd $HOME/qmk_firmware
          make wetzii_hackpad:default
          find . -name "*.uf2" -exec cp {} $GITHUB_WORKSPACE/firmware.uf2 \;

      - name: Upload .uf2
        uses: actions/upload-artifact@v4
        with:
          name: wetzii_hackpad_firmware
          path: firmware.uf2
          if-no-files-found: warn
