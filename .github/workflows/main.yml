name: Build Hackpad UF2 for Seed Studio

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Install build tools
      run: |
        sudo apt update
        sudo apt install -y cmake gcc-arm-none-eabi build-essential libnewlib-arm-none-eabi ninja-build git

    - name: Clone Pico SDK
      run: |
        git clone https://github.com/raspberrypi/pico-sdk.git $HOME/pico-sdk
        cd $HOME/pico-sdk
        git submodule update --init

    - name: Build Hackpad UF2
      run: |
        mkdir build
        cd build
        cmake .. -D PICO_BOARD=xiao_rp2040 -G Ninja
        ninja

    - name: Upload UF2 Artifact
      uses: actions/upload-artifact@v4
      with:
        name: hackpad-uf2
        path: build/hackpad.uf2
